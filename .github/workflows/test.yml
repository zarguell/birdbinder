name: Tests

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 (Node 24)
        with:
          python-version: "3.14"

      - name: Install deps
        working-directory: backend
        run: |
          pip install -e ".[dev]" || pip install .

      - name: Compile check
        working-directory: backend
        run: |
          python -m py_compile app/*.py app/routers/*.py app/services/*.py
          echo "All files compile OK"

      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ -v --tb=short
